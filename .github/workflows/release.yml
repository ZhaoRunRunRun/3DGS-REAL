name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk 3DGS-REAL-Android.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: 3DGS-REAL-Android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows
        run: flutter build windows --release
      
      - name: Archive Windows build
        shell: pwsh
        run: |
          $releasePath = "build\windows\x64\runner\Release"
          if (Test-Path $releasePath) {
            Compress-Archive -Path "$releasePath\*" -DestinationPath "3DGS-REAL-Windows.zip"
          } else {
            Write-Host "Release path not found, trying runner path"
            Compress-Archive -Path "build\windows\runner\Release\*" -DestinationPath "3DGS-REAL-Windows.zip"
          }
      
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: 3DGS-REAL-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Linux
        run: flutter build linux --release
      
      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../3DGS-REAL-Linux.tar.gz .
      
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: 3DGS-REAL-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS
        run: flutter build macos --release
      
      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../3DGS-REAL-macOS.zip three_dgs_real.app
      
      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: 3DGS-REAL-macOS.zip

  create-release:
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 3DGS REAL ${{ github.ref_name }}
            
            ### 新功能
            - ✅ 真实相机拍摄：实时预览、引导式拍摄
            - ✅ 相册批量导入：多文件选择、自动排序
            - ✅ 照片质量管理：质量评分、过滤功能
            - ✅ 本地/远端重建：支持两种建模方式
            - ✅ 模型预览与导出：支持SPLAT/PLY/GLB格式
            
            ### 支持平台
            - 🪟 Windows - 下载 `3DGS-REAL-Windows.zip`
            - 🍎 macOS - 下载 `3DGS-REAL-macOS.zip`
            - 🐧 Linux - 下载 `3DGS-REAL-Linux.tar.gz`
            - 🤖 Android - 下载 `3DGS-REAL-Android.apk`
            
            ### 安装说明
            请参考 [快速开始指南](https://github.com/ZhaoRunRunRun/3DGS-REAL/blob/main/docs/quick_start.md)
            
            ### 项目主页
            https://zhaorunrunrun.github.io/3DGS-REAL/
          files: |
            artifacts/android-apk/3DGS-REAL-Android.apk
            artifacts/windows-build/3DGS-REAL-Windows.zip
            artifacts/linux-build/3DGS-REAL-Linux.tar.gz
            artifacts/macos-build/3DGS-REAL-macOS.zip
          draft: false
          prerelease: false
